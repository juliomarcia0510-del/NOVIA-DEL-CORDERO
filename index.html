<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iglesia Novia Del Cordero</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Poppins', sans-serif; 
            margin: 0;
            padding: 0;
            overflow-x: hidden; /* Evita que la pantalla se mueva de lado */
        }
        .font-cinzel { font-family: 'Cinzel', serif; }
        
        /* Efecto de cristal para botones */
        .glass { 
            background: rgba(255, 255, 255, 0.2); 
            backdrop-filter: blur(8px); 
            border: 1px solid rgba(255, 255, 255, 0.3); 
        }

        .dark .glass { background: rgba(15, 23, 42, 0.8); }

        /* Corregimos el problema de capas */
        .header-content {
            position: relative;
            z-index: 20;
        }

        .bg-celestial { 
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%); 
            min-height: 100vh;
        }
        
        .dark .bg-celestial { 
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%); 
            color: white; 
        }

        .btn-clickable {
            cursor: pointer;
            pointer-events: auto !important; /* Fuerza a que el botón sea clickeable */
        }
    </style>
</head>
<body class="bg-celestial">

    <div id="page1" class="block w-full">
        <header class="relative h-[70vh] w-full flex flex-col items-center justify-center text-center text-white px-4">
            <div class="absolute inset-0 z-0">
                <img src="https://images.unsplash.com/photo-1515162305285-0293e4767cc2?auto=format&fit=crop&q=80&w=1000" 
                     class="w-full h-full object-cover brightness-[0.4]" alt="Fondo">
            </div>
            
            <button onclick="showAlert('Nuestra Visión', 'Establecer el reino de Dios mediante la evangelización y el discipulado en base a la visión general de las Asambleas de Dios.')" 
                    class="absolute top-6 right-6 glass px-5 py-2 rounded-full text-xs font-bold border-2 border-yellow-500 z-50 btn-clickable">
                <i class="fas fa-eye mr-1"></i> VISIÓN
            </button>

            <div class="header-content">
                <h1 class="font-cinzel text-4xl md:text-6xl mb-2 drop-shadow-2xl">NOVIA DEL CORDERO</h1>
                <p class="italic text-lg mb-8 opacity-90">"La Esposa se ha preparado"</p>
                
                <button onclick="showAlert('Apocalipsis 19:7-9', '¡Gocémonos y alegrémonos y démosle gloria; porque han llegado las bodas del Cordero, y su esposa se ha preparado...')" 
                        class="bg-white/10 hover:bg-white/30 text-white px-10 py-4 rounded-full border border-white/40 backdrop-blur-md font-semibold btn-clickable transition-all">
                    📖 Apocalipsis 19:7-9
                </button>
            </div>
        </header>

        <div class="flex justify-center gap-6 py-8 relative z-30">
            <button onclick="toggleDarkMode()" class="bg-white dark:bg-slate-800 p-4 rounded-full shadow-lg text-blue-900 dark:text-yellow-400 btn-clickable">
                <i class="fas fa-moon text-xl"></i>
            </button>
            <button onclick="promptAdmin()" class="bg-blue-900 text-white px-8 py-4 rounded-full font-bold shadow-lg btn-clickable">
                ADMINISTRADORES
            </button>
            <button onclick="window.open('https://www.google.com/maps')" class="bg-white dark:bg-slate-800 p-4 rounded-full shadow-lg text-red-500 btn-clickable">
                <i class="fas fa-location-dot text-xl"></i>
            </button>
        </div>

        <main class="max-w-4xl mx-auto px-6 pb-20">
            
            <h2 class="font-cinzel text-2xl text-center mb-6 border-b-2 border-blue-300 pb-2">Servicios y Cultos</h2>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-12">
                <button onclick="showDay('Martes: Adoración', 'Hna. Maria Lopez', 'Alabanza Profética')" class="p-4 glass rounded-2xl flex justify-between items-center hover:bg-white/50 btn-clickable">
                    <span class="font-bold">Martes: Adoración</span> <i class="fas fa-music text-blue-500"></i>
                </button>
                <button onclick="showDay('Jueves: Júbilo', 'Hno. Juan Pérez', 'Cantos de Victoria')" class="p-4 glass rounded-2xl flex justify-between items-center hover:bg-white/50 btn-clickable">
                    <span class="font-bold">Jueves: Júbilo</span> <i class="fas fa-bolt text-yellow-500"></i>
                </button>
                <button onclick="showDay('Viernes: Crecimiento', 'Pastor Miguel', 'Estudio Bíblico')" class="p-4 glass rounded-2xl flex justify-between items-center hover:bg-white/50 btn-clickable">
                    <span class="font-bold">Viernes: Crecimiento</span> <i class="fas fa-leaf text-green-500"></i>
                </button>
                <button onclick="showDay('Sábado: Jóvenes', 'Líder Omar', 'Reunión Juvenil')" class="p-4 glass rounded-2xl flex justify-between items-center hover:bg-white/50 btn-clickable">
                    <span class="font-bold">Sábado: Jóvenes</span> <i class="fas fa-fire text-orange-500"></i>
                </button>
                <button onclick="showSunday()" class="p-5 bg-blue-600 text-white rounded-2xl flex justify-between items-center col-span-full shadow-lg btn-clickable">
                    <span class="font-bold text-xl">Domingo: Culto General</span> <i class="fas fa-church text-2xl"></i>
                </button>
            </div>

            <h2 class="font-cinzel text-2xl text-center mb-6 border-b-2 border-red-300 pb-2">Eventos Especiales</h2>
            <div class="flex flex-wrap justify-center gap-4 mb-12">
                <button onclick="showAlert('Campaña', 'Próxima Campaña Evangelística: 20 al 22 de Marzo.')" class="bg-red-500 text-white px-6 py-3 rounded-full btn-clickable shadow-md">Campaña</button>
                <button onclick="showAlert('Culto Unido', 'Gran Culto Unido: Último Domingo del mes.')" class="bg-indigo-600 text-white px-6 py-3 rounded-full btn-clickable shadow-md">Culto Unido</button>
                <button onclick="showAlert('Vigilia', 'Noche de Poder: Primer Viernes de cada mes.')" class="bg-slate-800 text-white px-6 py-3 rounded-full btn-clickable shadow-md">Vigilia</button>
            </div>

            <h2 class="font-cinzel text-2xl text-center mb-6 border-b-2 border-orange-300 pb-2">Ventas y Actividades</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <button onclick="showMenu()" class="bg-orange-500 text-white p-8 rounded-3xl btn-clickable shadow-xl text-2xl font-bold flex items-center justify-center gap-4">
                    <i class="fas fa-utensils"></i> Venta de Comida
                </button>
                <button onclick="showSorteos()" class="bg-emerald-600 text-white p-8 rounded-3xl btn-clickable shadow-xl text-2xl font-bold flex items-center justify-center gap-4">
                    <i class="fas fa-ticket-alt"></i> Sorteos
                </button>
            </div>

            <div class="mt-20 flex justify-center">
                <button onclick="changePage(2)" class="bg-blue-900 text-white px-12 py-5 rounded-full text-xl font-bold btn-clickable animate-bounce flex items-center gap-3">
                    Fortalecimiento Espiritual <i class="fas fa-arrow-right"></i>
                </button>
            </div>
        </main>
    </div>

    <div id="page2" class="hidden w-full">
        <header class="relative h-[40vh] flex flex-col items-center justify-center text-white text-center">
            <img src="https://images.unsplash.com/photo-1504052434139-4415214d035f?auto=format&fit=crop&q=80&w=1000" class="absolute inset-0 w-full h-full object-cover brightness-50" alt="Biblia">
            <h1 class="relative z-10 font-cinzel text-3xl">FORTALECIMIENTO ESPIRITUAL</h1>
            <button onclick="changePage(1)" class="absolute top-4 left-4 bg-white text-blue-900 px-4 py-2 rounded-full font-bold btn-clickable">Volver</button>
        </header>
        
        <div class="max-w-2xl mx-auto p-6 space-y-4">
            <button onclick="showAlert('Ayuno', 'Lunes 6:00 AM')" class="w-full p-6 glass rounded-2xl btn-clickable text-left flex items-center gap-4 shadow-sm">
                <i class="fas fa-person-praying text-blue-500 text-3xl"></i>
                <div>
                    <h3 class="font-bold text-xl">Semana de Ayuno</h3>
                    <p class="text-sm opacity-60 italic">Purificando el alma</p>
                </div>
            </button>
            <a href="https://wa.me/50499999999" target="_blank" class="block w-full bg-green-500 text-white p-8 rounded-3xl text-center text-2xl font-bold mt-10 shadow-2xl btn-clickable">
                <i class="fab fa-whatsapp mr-2"></i> Petición de Oración
            </a>
        </div>
    </div>

    <div id="modal" class="fixed inset-0 bg-black/70 hidden z-[100] flex items-center justify-center p-4">
        <div class="bg-white dark:bg-slate-900 w-full max-w-md p-8 rounded-[40px] relative shadow-2xl">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-3xl font-bold text-gray-500 hover:text-black btn-clickable">×</button>
            <div id="modal-content" class="text-gray-800 dark:text-white"></div>
        </div>
    </div>

    <script>
        // Función para cambiar de página
        function changePage(pageNum) {
            const p1 = document.getElementById('page1');
            const p2 = document.getElementById('page2');
            if (pageNum === 1) {
                p1.style.display = 'block';
                p2.style.display = 'none';
            } else {
                p1.style.display = 'none';
                p2.style.display = 'block';
            }
            window.scrollTo(0, 0);
        }

        // Modo Oscuro
        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
        }

        // Mostrar Alertas
        function showAlert(title, text) {
            const content = `
                <h2 class="text-3xl font-cinzel text-blue-600 dark:text-blue-400 mb-4">${title}</h2>
                <p class="text-lg leading-relaxed">${text}</p>
                <button onclick="closeModal()" class="mt-6 w-full bg-blue-100 dark:bg-blue-900 p-3 rounded-xl font-bold btn-clickable">Entendido</button>
            `;
            document.getElementById('modal-content').innerHTML = content;
            document.getElementById('modal').classList.remove('hidden');
        }

        // Mostrar Culto Domingo
        function showSunday() {
            const content = `
                <h2 class="text-3xl font-cinzel text-blue-600 mb-4">Domingo General</h2>
                <div class="bg-yellow-100 text-yellow-900 p-4 rounded-xl mb-4">
                    <b>Escuela Dominical:</b> 10:00 AM (Maestra Lucía)
                </div>
                <p class="mb-2"><b>Culto General:</b> 5:00 PM</p>
                <p class="mb-2"><b>Predicador:</b> Pastor Miguel Omar</p>
                <p><b>Dirección:</b> Auditorio Principal</p>
            `;
            document.getElementById('modal-content').innerHTML = content;
            document.getElementById('modal').classList.remove('hidden');
        }

        // Mostrar Menú de Comida
        function showMenu() {
            const content = `
                <h2 class="text-2xl font-cinzel text-orange-600 mb-4">Menú de Bendición</h2>
                <div class="space-y-4">
                    <div class="flex justify-between border-b pb-1"><span>Pollo Frito</span> <b>L. 120</b></div>
                    <div class="flex justify-between border-b pb-1"><span>Tacos Birria</span> <b>L. 100</b></div>
                    <div class="flex justify-between border-b pb-1"><span>Enchiladas</span> <b>L. 25</b></div>
                    <p class="font-bold text-purple-600 mt-4 underline">Antojos Juveniles</p>
                    <div class="flex justify-between border-b pb-1"><span>Piña Loca</span> <b>L. 60</b></div>
                    <div class="flex justify-between border-b pb-1"><span>Elotes Locos</span> <b>L. 45</b></div>
                </div>
            `;
            document.getElementById('modal-content').innerHTML = content;
            document.getElementById('modal').classList.remove('hidden');
        }

        function showSorteos() {
            const content = `
                <h2 class="text-2xl font-cinzel text-emerald-600 mb-4">Sorteos</h2>
                <div class="space-y-3">
                    <button onclick="buy('Licuadora')" class="w-full p-4 bg-gray-50 dark:bg-slate-800 rounded-xl flex justify-between btn-clickable"><span>Licuadora</span> <b>L. 50</b></button>
                    <button onclick="buy('Smart TV')" class="w-full p-4 bg-gray-50 dark:bg-slate-800 rounded-xl flex justify-between btn-clickable"><span>Smart TV 50"</span> <b>L. 100</b></button>
                </div>
            `;
            document.getElementById('modal-content').innerHTML = content;
            document.getElementById('modal').classList.remove('hidden');
        }

        function buy(item) {
            window.open(`https://wa.me/50499999999?text=Hola, quiero comprar un boleto para el sorteo de: ${item}`);
        }

        function promptAdmin() {
            const pass = prompt("Contraseña de Administrador:");
            if(pass === "1234") {
                const msg = prompt("Mensaje de cambio para Google Sheets:");
                if(msg) window.open(`https://wa.me/50499999999?text=ADMIN_SHEETS: ${msg}`);
            } else {
                alert("Incorrecto");
            }
        }

        function showDay(dia, encargado, mensaje) {
            const content = `
                <h2 class="text-2xl font-cinzel text-blue-600 mb-4">${dia}</h2>
                <p class="mb-2"><b>Encargado:</b> ${encargado}</p>
                <p class="bg-blue-50 dark:bg-blue-900 p-4 rounded-lg italic">"${mensaje}"</p>
            `;
            document.getElementById('modal-content').innerHTML = content;
            document.getElementById('modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
        }
    </script>
</body>
</html>
