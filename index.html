<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iglesia Novia Del Cordero</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --celestial-blue: #1e3a8a;
        }
        body { font-family: 'Poppins', sans-serif; transition: all 0.3s ease; }
        .font-cinzel { font-family: 'Cinzel', serif; }
        .glass { background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .dark .glass { background: rgba(0, 0, 0, 0.4); }
        .btn-oval { border-radius: 50px; transition: transform 0.2s; }
        .btn-oval:hover { transform: scale(1.05); }
        .hidden-section { display: none; }
        .bg-celestial { background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%); }
        .dark .bg-celestial { background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%); color: white; }
    </style>
</head>
<body class="bg-celestial">

    <div id="page1" class="min-h-screen">
        <header class="relative h-[60vh] flex flex-col items-center justify-center text-center text-white px-4 overflow-hidden">
            <img src="https://images.unsplash.com/photo-1515162305285-0293e4767cc2?auto=format&fit=crop&q=80&w=1000" 
                 class="absolute inset-0 w-full h-full object-cover z-0 brightness-50" alt="Adoración">
            
            <button onclick="showAlert('Nuestra Visión (Asambleas de Dios)', 'Establecer el reino de Dios mediante la evangelización, el discipulado y la plantación de iglesias en el poder del Espíritu Santo.')" 
                    class="absolute top-4 right-4 glass text-white px-6 py-2 btn-oval text-sm font-bold border-2 border-yellow-500 z-10">
                <i class="fas fa-eye mr-2 text-yellow-400"></i>VISIÓN
            </button>

            <div class="z-10">
                <h1 class="font-cinzel text-5xl md:text-7xl mb-4 drop-shadow-lg tracking-widest uppercase">Novia Del Cordero</h1>
                <p class="italic text-xl">"Preparada para el encuentro"</p>
            </div>
